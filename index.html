<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ledger — Expense Tracker</title>
  <link rel="stylesheet" href="src/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo">⬡ Ledger</span>
      <span class="tagline">Track every rupee</span>
    </div>
    <div class="header-right">
      <span class="current-date" id="currentDate"></span>
    </div>
  </header>

  <!-- Summary Bar -->
  <section class="summary-bar">
    <div class="summary-card income">
      <div class="summary-label">Total Income</div>
      <div class="summary-amount" id="totalIncome">₹0</div>
    </div>
    <div class="summary-card balance">
      <div class="summary-label">Balance</div>
      <div class="summary-amount" id="totalBalance">₹0</div>
    </div>
    <div class="summary-card expense">
      <div class="summary-label">Total Expenses</div>
      <div class="summary-amount" id="totalExpense">₹0</div>
    </div>
  </section>

  <!-- Main Layout -->
  <main class="main-layout">

    <!-- Left: Add Transaction -->
    <aside class="form-panel">
      <h2 class="panel-title">New Transaction</h2>

      <div class="type-toggle">
        <button class="toggle-btn active" id="btnExpense" onclick="setType('expense')">Expense</button>
        <button class="toggle-btn" id="btnIncome" onclick="setType('income')">Income</button>
      </div>

      <div class="form-group">
        <label>Description</label>
        <input type="text" id="desc" placeholder="e.g. Dinner at Behrouz" />
      </div>

      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="amount" placeholder="0.00" min="0" />
      </div>

      <div class="form-group">
        <label>Category</label>
        <select id="category">
          <option value="Food">🍜 Food</option>
          <option value="Transport">🚌 Transport</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Health">💊 Health</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Makeup">💄 Makeup & Beauty</option>
          <option value="Utilities">💡 Utilities</option>
          <option value="Salary">💼 Salary</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="date" id="date" />
      </div>

      <button class="add-btn" onclick="addTransaction()">+ Add Transaction</button>
      <div class="form-error" id="formError"></div>
    </aside>

    <!-- Right: Month Nav + Category Chart + Budget + Transactions -->
    <div class="right-panel">

      <!-- Month Navigator -->
      <div class="month-nav">
        <button class="month-nav-btn" onclick="changeViewMonth(-1)">&#8249;</button>
        <span id="viewMonthLabel"></span>
        <button class="month-nav-btn" onclick="changeViewMonth(1)">&#8250;</button>
      </div>

      <!-- Category Breakdown + Budget Limits -->
      <div class="chart-section">
        <div class="chart-header">
          <h2 class="panel-title">Spending by Category</h2>
          <button class="set-limits-btn" id="setLimitsBtn" onclick="toggleBudgetPanel()">⊕ Set Limits</button>
        </div>

        <div class="bars-container" id="categoryBars">
          <p class="empty-hint">No expenses yet.</p>
        </div>

        <!-- Budget Inputs Panel (hidden by default) -->
        <div class="budget-inputs-panel" id="budgetInputsPanel" style="display:none">
          <div class="budget-inputs-grid" id="budgetInputsGrid"></div>
          <button class="save-limits-btn" onclick="saveLimits()">Save Limits</button>
        </div>
      </div>

      <!-- Transaction List -->
      <div class="transactions-section">
        <div class="tx-header">
          <h2 class="panel-title">Transactions</h2>
          <div class="tx-actions">
            <div class="filter-row">
              <select id="filterCategory" onchange="renderTransactions()">
                <option value="all">All Categories</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Shopping">Shopping</option>
                <option value="Health">Health</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Makeup">Makeup</option>
                <option value="Utilities">Utilities</option>
                <option value="Salary">Salary</option>
                <option value="Other">Other</option>
              </select>
              <select id="filterType" onchange="renderTransactions()">
                <option value="all">All Types</option>
                <option value="expense">Expense</option>
                <option value="income">Income</option>
              </select>
            </div>
            <button class="export-btn" onclick="exportCSV()">↓ Export CSV</button>
          </div>
        </div>

        <div class="tx-list" id="txList">
          <div class="empty-state">
            <span class="empty-icon">⬡</span>
            <p>No transactions yet.<br/>Add one to get started.</p>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="src/app.js"></script>
</body>
</html>
